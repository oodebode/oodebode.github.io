<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0B2545"/>

  <!-- Clip path for right hemisphere only -->
  <defs>
    <clipPath id="right-hemi">
      <path d="
        M32 14
        C36 13, 41 14, 44 18
        C47 22, 47 26, 46 29
        C49 31, 50 35, 49 39
        C48 43, 45 45, 42 46
        C42 49, 39 52, 36 53
        C34 54, 33 53, 32 52
        L32 14Z
      "/>
    </clipPath>
  </defs>

  <!-- CENTER DIVIDING LINE -->
  <line x1="32" y1="14" x2="32" y2="52" stroke="#2E5E8A" stroke-width="0.8" stroke-dasharray="2 2"/>

  <!-- ── LEFT HALF: anatomical brain ───────────────────────── -->
  <path d="
    M32 14
    C28 13, 23 14, 20 18
    C17 22, 17 26, 18 29
    C15 31, 14 35, 15 39
    C16 43, 19 45, 22 46
    C22 49, 25 52, 28 53
    C30 54, 31 53, 32 52
    L32 14Z
  " fill="#0F2E50" stroke="#5B9EC9" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Cortex folds -->
  <path d="M28 17 C24 19, 22 23, 25 25" fill="none" stroke="#5B9EC9" stroke-width="1" stroke-linecap="round"/>
  <path d="M19 24 C17 28, 18 32, 21 33" fill="none" stroke="#5B9EC9" stroke-width="1" stroke-linecap="round"/>
  <path d="M22 33 C20 36, 21 40, 24 41" fill="none" stroke="#5B9EC9" stroke-width="1" stroke-linecap="round"/>
  <path d="M26 41 C24 44, 25 48, 28 49" fill="none" stroke="#5B9EC9" stroke-width="1" stroke-linecap="round"/>
  <path d="M25 25 C23 28, 24 31, 27 32" fill="none" stroke="#5B9EC9" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M28 35 C26 38, 27 41, 29 42" fill="none" stroke="#5B9EC9" stroke-width="0.8" stroke-linecap="round"/>

  <!-- ── RIGHT HALF: node network (clipped to hemisphere) ──── -->
  <path d="
    M32 14
    C36 13, 41 14, 44 18
    C47 22, 47 26, 46 29
    C49 31, 50 35, 49 39
    C48 43, 45 45, 42 46
    C42 49, 39 52, 36 53
    C34 54, 33 53, 32 52
    L32 14Z
  " fill="#0F2E50" stroke="#5B9EC9" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- All nodes and edges clipped inside hemisphere -->
  <g clip-path="url(#right-hemi)">
    <!-- Edges first so nodes render on top -->
    <line x1="36" y1="20" x2="43" y2="23" stroke="#B8D8F0" stroke-width="0.7" opacity="0.6"/>
    <line x1="36" y1="20" x2="35" y2="29" stroke="#5B9EC9" stroke-width="0.9" opacity="0.8"/>
    <line x1="43" y1="23" x2="44" y2="30" stroke="#B8D8F0" stroke-width="0.7" opacity="0.55"/>
    <line x1="43" y1="23" x2="40" y2="28" stroke="#5B9EC9" stroke-width="0.8" opacity="0.7"/>
    <line x1="44" y1="30" x2="40" y2="28" stroke="#B8D8F0" stroke-width="0.7" opacity="0.5"/>
    <line x1="44" y1="30" x2="46" y2="37" stroke="#B8D8F0" stroke-width="0.7" opacity="0.55"/>
    <line x1="35" y1="29" x2="40" y2="28" stroke="#5B9EC9" stroke-width="1" opacity="0.85"/>
    <line x1="40" y1="28" x2="46" y2="37" stroke="#5B9EC9" stroke-width="0.8" opacity="0.7"/>
    <line x1="40" y1="28" x2="37" y2="37" stroke="#5B9EC9" stroke-width="0.9" opacity="0.75"/>
    <line x1="46" y1="37" x2="44" y2="44" stroke="#B8D8F0" stroke-width="0.7" opacity="0.55"/>
    <line x1="46" y1="37" x2="40" y2="43" stroke="#B8D8F0" stroke-width="0.7" opacity="0.5"/>
    <line x1="37" y1="37" x2="40" y2="43" stroke="#5B9EC9" stroke-width="0.8" opacity="0.6"/>
    <line x1="37" y1="37" x2="34" y2="44" stroke="#B8D8F0" stroke-width="0.7" opacity="0.5"/>
    <line x1="44" y1="44" x2="40" y2="43" stroke="#B8D8F0" stroke-width="0.7" opacity="0.55"/>
    <line x1="35" y1="29" x2="37" y2="37" stroke="#5B9EC9" stroke-width="0.6" opacity="0.4"/>
    <line x1="40" y1="43" x2="34" y2="44" stroke="#B8D8F0" stroke-width="0.7" opacity="0.5"/>

    <!-- Nodes -->
    <circle cx="36" cy="20" r="1.8" fill="#B8D8F0"/>
    <circle cx="43" cy="23" r="1.4" fill="#B8D8F0"/>
    <circle cx="44" cy="30" r="1.6" fill="#B8D8F0"/>
    <circle cx="35" cy="29" r="2.0" fill="#5B9EC9"/>
    <circle cx="46" cy="37" r="1.4" fill="#B8D8F0"/>
    <circle cx="40" cy="28" r="2.6" fill="#5B9EC9"/>
    <circle cx="37" cy="37" r="1.8" fill="#B8D8F0"/>
    <circle cx="44" cy="44" r="1.4" fill="#B8D8F0"/>
    <circle cx="40" cy="43" r="1.6" fill="#B8D8F0"/>
    <circle cx="34" cy="44" r="1.3" fill="#B8D8F0" opacity="0.8"/>
  </g>

</svg>
